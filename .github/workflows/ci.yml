name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # Fast, dependency-free gate: catches real breakage (syntax errors,
    # undefined names) and malformed notebooks. This is the required check.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff (errors only — syntax & undefined names)
        run: ruff check --output-format=github --select E9,F63,F7,F82 .
      - name: Compile all Python sources
        run: python -m compileall -q persona_steering pipeline scripts
      - name: Validate notebooks are well-formed JSON
        run: |
          python - <<'PY'
          import json, glob, sys
          bad = []
          for nb in glob.glob("notebooks/*.ipynb"):
              try:
                  d = json.load(open(nb))
                  assert "cells" in d and d.get("nbformat") == 4
              except Exception as e:
                  bad.append(f"{nb}: {e}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print(f"OK: {len(glob.glob('notebooks/*.ipynb'))} notebooks valid")
          PY

  smoke-import:
    # Real install + import: confirms the package builds and core loaders work.
    # Heavier (installs the ML stack); informational unless you mark it required.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: Import + load personas and trait datasets
        run: |
          python - <<'PY'
          import persona_steering
          from persona_steering.personas import load_all_personas
          from persona_steering.data import load_all_trait_datasets
          from persona_steering.config import Trait, GEMMA_2_27B
          personas = load_all_personas()
          traits = list(Trait)
          assert personas, "no personas loaded"
          assert len(traits) == 8, f"expected 8 traits, got {len(traits)}"
          print(f"OK: {len(personas)} personas, {len(traits)} traits, model={GEMMA_2_27B.hf_id}")
          PY
